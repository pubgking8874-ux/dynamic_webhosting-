<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dhruv AWS Project - Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page-bg">
    <div class="orb2"></div>
    <div class="card">

      <!-- BRAND -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
          </svg>
        </div>
        <div class="brand-name">Dhruv AWS Project</div>
        <div class="brand-sub">Create your account</div>
      </div>

      <!-- FORM -->
      <form id="signupForm" novalidate>

        <!-- EMAIL -->
        <div class="field-group" id="emailGroup">
          <label class="field-label" for="email">Email address</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" class="field-input" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- PASSWORD -->
        <div class="field-group" id="passwordGroup">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" class="field-input" placeholder="Min. 8 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pass" id="togglePass">
              <!-- Eye icon — innerHTML will be swapped by JS -->
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
          <div class="strength-row">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-lbl" id="strengthLabel"></span>
          </div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn-signup" id="signupBtn">
          <span id="btnText">Create Account</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>

      </form>

      <div class="divider"><span>or</span></div>
      <div class="footer-txt">Already have an account? <a href="login.html" id="goLogin">Sign in</a></div>

    </div>
  </div>

  <!-- 1. Amplify Library -->
  <script src="https://unpkg.com/aws-amplify@5.0.4/dist/aws-amplify.min.js"></script>

  <!-- 2. Amplify Config -->
  <script>
    aws_amplify.Amplify.configure({
      Auth: {
        region: "ap-south-1",
        userPoolId: "ap-south-1_VdrXAYPhu",
        userPoolWebClientId: "m93eeqmmi592scujp26l2h0co"
      }
    });
  </script>

  <!-- 3. App Logic -->
  <script src="app.js"></script>

</body>
</html>
