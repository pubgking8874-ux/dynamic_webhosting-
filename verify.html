<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="page-bg">
  <div class="orb2"></div>

  <div class="card">

    <!-- BRAND -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <div class="brand-name">Verify Account</div>
      <div class="brand-sub">Enter the OTP sent to your email</div>
    </div>

    <!-- FORM -->
    <form id="verifyForm" novalidate>

      <!-- EMAIL (pre-filled from localStorage) -->
      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" class="field-input" placeholder="you@example.com"/>
        </div>
      </div>

      <!-- OTP -->
      <div class="field-group">
        <label class="field-label" for="otp">OTP Code</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="text" id="otp" class="field-input" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric"/>
        </div>
        <span class="field-error" id="otpError"></span>
      </div>

      <!-- BUTTON -->
      <button type="submit" class="btn-signup" id="verifyBtn">
        <span id="verifyBtnText">Verify Account</span>
        <span id="verifySpinner" class="spinner" style="display:none;"></span>
      </button>

    </form>

    <div class="footer-txt" style="margin-top:20px;">
      Didn't receive OTP? <a href="#" id="resendLink">Resend</a>
    </div>

  </div>
</div>

<!-- 1. Amplify Library -->
<script src="https://unpkg.com/aws-amplify@5.0.4/dist/aws-amplify.min.js"></script>

<!-- 2. Amplify Config — FIXED: use aws_amplify.Amplify (not plain Amplify) -->
<script>
  aws_amplify.Amplify.configure({
    Auth: {
      region: "ap-south-1",
      userPoolId: "ap-south-1_VdrXAYPhu",
      userPoolWebClientId: "m93eeqmmi592scujp26l2h0co"
    }
  });
</script>

<!-- 3. Verify Logic -->
<script src="verify.js"></script>

</body>
</html>
